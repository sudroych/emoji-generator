<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Random Emoji Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .emoji-display {
            font-size: 120px;
            margin: 40px 0;
            min-height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .button-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .emoji-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .emoji-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .emoji-button:active {
            transform: translateY(-1px);
        }

        .multi-button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .counter {
            margin-top: 20px;
            color: #666;
            font-size: 1rem;
        }

        .info {
            margin-top: 30px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            color: #666;
            font-size: 0.9rem;
        }

        .welcome-banner {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-banner h2 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            color: white;
        }

        .welcome-banner p {
            margin: 0;
            font-size: 1rem;
            opacity: 0.95;
        }

        .user-info {
            font-weight: bold;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

            <p>Hello, <span class="user-info" id="userName">Guest</span>!</p>
            <p style="font-size: 0.85rem; margin-top: 5px; opacity: 0.9;">Device: <span id="deviceInfo"></span></p>
        </div>
        
        <h1>🎲 Random Emoji Generator</h1>
        
        <div class="emoji-display" id="emojiDisplay">
            Click the button!
        </div>
        
        <div class="button-container">
            <button class="emoji-button" id="generateBtn" onclick="generateEmoji()">
                Generate Emoji
            </button>
            
            <button class="emoji-button multi-button" id="multiBtn" onclick="generateMultipleEmojis()">
                Generate 5 Emojis
            </button>
        </div>
        
        <div class="counter" id="counter">
            Clicks: 0
        </div>

        <div class="info">
            Click the button to get a random emoji! 🎉
        </div>
    </div>

        function generateEmoji() {
            // Get random emoji from array
            const randomIndex = Math.floor(Math.random() * emojis.length);
            const randomEmoji = emojis[randomIndex];
            
            // Display the emoji
            const emojiDisplay = document.getElementById('emojiDisplay');
            emojiDisplay.textContent = randomEmoji;
            emojiDisplay.style.fontSize = '120px';
            
            // Reset animation
            emojiDisplay.style.animation = 'none';
            setTimeout(() => {
                emojiDisplay.style.animation = 'fadeIn 0.3s ease-in';
            }, 10);
            
            // Update counter
            clickCount++;
            document.getElementById('counter').textContent = `Clicks: ${clickCount}`;
        }

            for (let i = 0; i < 5; i++) {
                const randomIndex = Math.floor(Math.random() * emojis.length);
                multipleEmojis += emojis[randomIndex] + ' ';
            }
            
            // Display the emojis
            emojiDisplay.textContent = multipleEmojis.trim();
            emojiDisplay.style.fontSize = '80px';
            
            // Reset animation
            emojiDisplay.style.animation = 'none';
            setTimeout(() => {
                emojiDisplay.style.animation = 'fadeIn 0.3s ease-in';
            }, 10);
            
            // Update counter
            clickCount++;
            document.getElementById('counter').textContent = `Clicks: ${clickCount}`;
        }

        // Get user and device information
        function displayWelcomeInfo() {
            // Get device/browser information
            const userAgent = navigator.userAgent;
            let deviceInfo = 'Unknown Device';
            
            // Detect device type
            if (/Windows/i.test(userAgent)) {
                deviceInfo = 'Windows PC';
            } else if (/Macintosh|MacIntel|MacPPC|Mac68K/i.test(userAgent)) {
                deviceInfo = 'Mac';
            } else if (/Linux/i.test(userAgent)) {
                deviceInfo = 'Linux';
            } else if (/Android/i.test(userAgent)) {
                deviceInfo = 'Android Device';
            } else if (/iPhone|iPad|iPod/i.test(userAgent)) {
                deviceInfo = 'iOS Device';
            }
            
            // Try to get computer name (limited in browsers for security)
            // We'll use a combination of browser and platform info
            const browserInfo = navigator.platform || 'Unknown Platform';
            
            // Display device info
            document.getElementById('deviceInfo').textContent = deviceInfo + ' (' + browserInfo + ')';
            
            // Prompt user for their name (optional)
            const userName = prompt('Welcome! Please enter your name:', 'Guest');
            if (userName && userName.trim() !== '') {
                document.getElementById('userName').textContent = userName.trim();
            }
        }
        
        // Call on page load
        window.addEventListener('load', displayWelcomeInfo);
    </script>
</body>
</html>
